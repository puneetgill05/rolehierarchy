<html lang="en">
<head>
  <meta charset="utf-8" />

  <title>NetworkX from Dict → Interactive HTML</title>
  <style>
    html, body { height: 100%; margin: 0; }
    header { padding: 12px 16px; background: #111; color: #fff; font-family: system-ui, sans-serif; }
    #panel { padding: 10px 14px; border-bottom: 1px solid #ddd; display: flex; gap: 16px; align-items: center; font-family: system-ui, sans-serif; flex-wrap: wrap; }
    #panel button { padding: 6px 10px; border: 1px solid #aaa; background: #f5f5f5; border-radius: 6px; cursor: pointer; }
    #panel button:hover { background: #eee; }
    svg { width: 100%; height: calc(100% - 96px); display: block; background: #fafafa; }
    .node { stroke: #fff; stroke-width: 1.5px; cursor: grab; }
    .node:active { cursor: grabbing; }
    .label { font-size: 11px; pointer-events: none; font-family: system-ui, sans-serif; }
  </style>
</head>
<body>

    <button id="zoomFit">Fit</button>

    const links = [{"source": "0", "target": "P8"}, {"source": "0", "target": "P7"}, {"source": "0", "target": "P25"}, {"source": "0", "target": "P30"}, {"source": "0", "target": "P27"}, {"source": "0", "target": "P28"}, {"source": "0", "target": "P3"}, {"source": "0", "target": "P11"}, {"source": "0", "target": "P4"}, {"source": "0", "target": "P31"}, {"source": "0", "target": "P9"}, {"source": "0", "target": "P21"}, {"source": "0", "target": "P19"}, {"source": "0", "target": "P2"}, {"source": "0", "target": "P24"}, {"source": "0", "target": "P15"}, {"source": "0", "target": "P12"}, {"source": "0", "target": "P29"}, {"source": "0", "target": "P18"}, {"source": "0", "target": "U29"}, {"source": "0", "target": "P26"}, {"source": "0", "target": "U0"}, {"source": "0", "target": "U9"}, {"source": "0", "target": "P6"}, {"source": "0", "target": "P16"}, {"source": "0", "target": "P20"}, {"source": "0", "target": "P10"}, {"source": "0", "target": "P1"}, {"source": "0", "target": "P5"}, {"source": "0", "target": "P0"}, {"source": "0", "target": "P22"}, {"source": "0", "target": "P17"}, {"source": "0", "target": "P13"}, {"source": "0", "target": "P23"}, {"source": "0", "target": "P14"}, {"source": "1", "target": "P7"}, {"source": "1", "target": "P8"}, {"source": "1", "target": "P25"}, {"source": "1", "target": "U17"}, {"source": "1", "target": "P11"}, {"source": "1", "target": "P9"}, {"source": "1", "target": "P21"}, {"source": "1", "target": "P19"}, {"source": "1", "target": "P24"}, {"source": "1", "target": "P15"}, {"source": "1", "target": "P12"}, {"source": "1", "target": "P18"}, {"source": "1", "target": "P26"}, {"source": "1", "target": "U3"}, {"source": "1", "target": "P6"}, {"source": "1", "target": "P16"}, {"source": "1", "target": "P20"}, {"source": "1", "target": "P10"}, {"source": "1", "target": "P5"}, {"source": "1", "target": "P22"}, {"source": "1", "target": "P17"}, {"source": "1", "target": "P13"}, {"source": "1", "target": "U11"}, {"source": "1", "target": " source": "7", "target": "P35"}, {"source": "7", "target": "U18"}, {"source": "7", "target": "P44"}, {"source": "7", "target": "P39"}, {"source": "7", "target": "P38"}, {"source": "7", "target": "P42"}, {"source": "8", "target": "8"}, {"source": "9", "target": "U31"}, {"source": "9", "target": "U26"}, {"source": "9", "target": "P34"}, {"source": "9", "target": "U34"}, {"source": "9", "target": "P35"}, {"source": "9", "target": "U43"}, {"source": "10", "target": "P29"}, {"source": "10", "target": "P0"}, {"source": "10", "target": "P27"}, {"source": "10", "target": "P43"}, {"source": "10", "target": "P2"}, {"source": "10", "target": "U27"}, {"source": "10", "target": "P4"}, {"source": "10", "target": "29"}, {"source": "10", "target": "P31"}, {"source": "29", "target": "1"}, {"source": "29", "target": "P1"}, {"source": "29", "target": "6"}, {"source": "29", "target": "7"}, {"source": "29", "target": "14"}, {"source": "11", "target": "P2"}, {"source": "11", "target": "1"}, {"source": "11", "target": "U30"}, {"source": "11", "target": "P29"}, {"source": "12", "target": "U38"}, {"source": "12", "target": "P38"}, {"source": "12", "target": "5"}, {"source": "12", "target": "P42"}, {"source": "13", "target": "U7"}, {"source": "13", "target": "P29"}, {"source": "13", "target": "P30"}, {"source": "13", "target": "P27"}, {"source": "13", "target": "P28"}, {"source": "13", "target": "P31"}, {"source": "14", "target": "1"}, {"source": "14", "target": "P33"}, {"source": "14", "target": "P32"}, {"source": "14", "target": "U42"}, {"source": "14", "target": "U1"}, {"source": "14", "target": "U18"}, {"source": "14", "target": "U13"}, {"source": "18", "target": "P1"}, {"source": "18", "target": "5"}, {"source": "18", "target": "P28"}, {"source": "18", "target": "U16"}, {"source": "18", "target": "U20"}, {"source": "18", "target": "U21"}, {"source": "22", "target": "P8"}, {"source": "22", "target": "P7"}, {"source": "22", "target": "P25"}, {"source": "22", "target": "P30"}, {"source": "2 1", "target": "U28"}, {"source": "31", "target": "U10"}, {"source": "31", "target": "U44"}, {"source": "31", "target": "U25"}, {"source": "31", "target": "U32"}, {"source": "31", "target": "U23"}, {"source": "31", "target": "U8"}, {"source": "33", "target": "24"}, {"source": "33", "target": "18"}, {"source": "33", "target": "U41"}];

    const svg = d3.select("svg");
    const width = svg.node().clientWidth;
    const height = svg.node().clientHeight;

    // Main groups for zoom/pan
    const gMain  = svg.append("g").attr("class", "gMain");
    const gLinks = gMain.append("g").attr("class", "links");
    const gNodes = gMain.append("g").attr("class", "nodes");
    const gLabels= gMain.append("g").attr("class", "labels");

  const link = gLinks.selectAll("line")
    .data(links)
    .join("line")
    .attr("class", "link")
    .attr("marker-end", "url(#arrow)")
    .attr("stroke", d => (d.weight == null) ? "#999" : (d.weight < 1 ? "#88c" : (d.weight < 3 ? "#c84" : "#000")))
    .attr("stroke-width", d => d.weight ? Math.max(1, Math.sqrt(d.weight)) : 1.5);


    // Color isolated nodes differently (deg == 0)
    const node = gNodes.selectAll("circle")
      .data(nodes)
      .join("circle")
        .attr("class", "node")
        .attr("r", 8)
        .attr("fill", (d, i) => (d.deg === 0 ? "#aaa" : d3.schemeTableau10[i % 10]));

    const label = gLabels.selectAll("text")
      .data(nodes)
      .join("text")
        .attr("class", "label")
        .attr("dx", 12)
        .attr("dy", "0.35em")
        .text(d => d.id);

    // --- Isolated node handling ---
    // Pre-position isolated nodes (deg==0) on a circle so they show nicely even if graph has other links.
    const iso = nodes.filter(d => (d.deg || 0) === 0);
    if (iso.length > 0) {
      const R = Math.min(width, height) / 2.6;
      iso.forEach((d, i) => {
        const a = 2 * Math.PI * i / iso.length;
        d.x = width/2  + R * Math.cos(a);
        d.y = height/2 + R * Math.sin(a);
      });
    }

    let sim = buildSimulation();

    function buildSimulation(charge=-220, distance=80) {
      const sim = d3.forceSimulation(nodes)
        .force("charge", d3.forceManyBody().strength(charge))
        .force("center", d3.forceCenter(width/2, height/2))
        .force("collide", d3.forceCollide(14))          // keep nodes from overlapping
        .force("x", d3.forceX(width/2).strength(0.02))  // gentle tether so isolated don't drift away
        .force("y", d3.forceY(height/2).strength(0.02))
        .on("tick", ticked);

      // Only add link force if links exist
      if (links.length > 0) {
        sim.force("link", d3.forceLink(links).id(d => d.id).distance(distance));
      }
      return sim;
    }

    function ticked() {
      gLinks.selectAll("line")
        .attr("x1", d => d.source.x)
        .attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x)
        .attr("y2", d => d.target.y);

      node.attr("cx", d => d.x).attr("cy", d => d.y);
      label.attr("x", d => d.x).attr("y", d => d.y);
    }

    // D3 zoom
    const zoom = d3.zoom()
      .scaleExtent([0.2, 5])
      .on("zoom", (event) => {
        gMain.attr("transform", event.transform);
      });
    svg.call(zoom).on("dblclick.zoom", null);

    // Buttons
    document.getElementById("zoomIn").addEventListener("click", () => {
      svg.transition().duration(250).call(zoom.scaleBy, 1.2);
    });
    document.getElementById("zoomOut").addEventListener("click", () => {
      svg.transition().duration(250).call(zoom.scaleBy, 1/1.2);
    });
    document.getElementById("zoomReset").addEventListener("click", () => {
      svg.transition().duration(300).call(zoom.transform, d3.zoomIdentity);
    });
    document.getElementById("zoomFit").addEventListener("click", () => zoomToFit());

    function zoomToFit(pad = 0.9) {
      const bounds = gMain.node().getBBox();
      const fullWidth  = svg.node().clientWidth;
      const fullHeight = svg.node().clientHeight;

      const dx = bounds.width;
      const dy = bounds.height;
      const cx = bounds.x + dx / 2;
      const cy = bounds.y + dy / 2;

      if (!dx || !dy) {
        svg.transition().call(zoom.transform, d3.zoomIdentity);
        return;
      }

      const scale = pad / Math.max(dx / fullWidth, dy / fullHeight);
      const transform = d3.zoomIdentity
        .translate(fullWidth / 2, fullHeight / 2)
        .scale(scale)
        .translate(-cx, -cy);

      svg.transition().duration(600).call(zoom.transform, transform);
    }

    // Dragging
    node.call(d3.drag()
      .on("start", (event, d) => {
        if (!event.active) sim.alphaTarget(0.3).restart();
        d.fx = d.x; d.fy = d.y;
      })
      .on("drag", (event, d) => {
        d.fx = event.x; d.fy = event.y;
      })
      .on("end", (event, d) => {
        if (!event.active) sim.alphaTarget(0);
        d.fx = null; d.fy = null;
      })
    );

    // Force controls
    const chargeInput = document.getElementById("charge");
    const distInput = document.getElementById("distance");

    chargeInput.addEventListener("input", (e) => {
      const val = +e.target.value;
      sim.force("charge").strength(val);
      sim.alpha(0.5).restart();
    });

    distInput.addEventListener("input", (e) => {
      const val = +e.target.value;
      if (sim.force("link")) {
        sim.force("link").distance(val);
        sim.alpha(0.5).restart();
      }
    });
  </script>
</body>
